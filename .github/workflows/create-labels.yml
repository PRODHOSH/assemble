name: Create Repository Labels

on:
  workflow_dispatch:

jobs:
  create-labels:
    name: Sync Labels
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync labels from YAML file
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const filePath = path.join(process.env.GITHUB_WORKSPACE, '.github/labels.yml');
            const fileContents = fs.readFileSync(filePath, 'utf8');
            
            const lines = fileContents.split('\n');
            const labels = [];
            let currentLabel = null;
            
            for (const line of lines) {
              const trimmed = line.trim();
              if (trimmed.startsWith('- name:')) {
                if (currentLabel) {
                  labels.push(currentLabel);
                }
                const nameVal = trimmed.substring('- name:'.length).trim().replace(/^["']|["']$/g, '');
                currentLabel = { name: nameVal };
              } else if (currentLabel && trimmed.startsWith('color:')) {
                const colorVal = trimmed.substring('color:'.length).trim().replace(/^["']|["']$/g, '');
                currentLabel.color = colorVal;
              } else if (currentLabel && trimmed.startsWith('description:')) {
                const descVal = trimmed.substring('description:'.length).trim().replace(/^["']|["']$/g, '');
                currentLabel.description = descVal;
              }
            }
            if (currentLabel) {
              labels.push(currentLabel);
            }
            
            const { owner, repo } = context.repo;
            
            for (const label of labels) {
              try {
                // Try to get existing label
                await github.rest.issues.getLabel({
                  owner,
                  repo,
                  name: label.name,
                });
                
                // Label exists, update it
                console.log(`Updating existing label: ${label.name}`);
                await github.rest.issues.updateLabel({
                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
              } catch (error) {
                if (error.status === 404) {
                  // Label does not exist, create it
                  console.log(`Creating new label: ${label.name}`);
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                } else {
                  console.error(`Error processing label ${label.name}:`, error);
                }
              }
            }
